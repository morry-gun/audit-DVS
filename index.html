<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Аудит — Магнат Бар / КДО</title>
<style>
  :root {
    --blue: #2C5FE8; --blue-light: #EBF0FF;
    --surface: #F5F6FA; --card: #FFFFFF; --text: #1B2640;
    --text-secondary: #5E6A81; --border: #D8DCE6; --border-light: #ECEEF3;
    --radius: 16px;
    --shadow: 0 2px 8px rgba(27,38,64,.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface: #111827; --card: #1E2736; --text: #E8ECF3;
      --text-secondary: #8B95A8; --border: #2E3A4E; --border-light: #252F40;
      --blue-light: #1E2D4A;
      --shadow: 0 2px 8px rgba(0,0,0,.2);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: var(--surface); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; -webkit-font-smoothing: antialiased;
  }
  .logo-area { text-align: center; margin-bottom: 32px; }
  .logo-icon { font-size: 48px; margin-bottom: 12px; }
  .logo-title { font-size: 22px; font-weight: 800; letter-spacing: -.02em; }
  .logo-sub { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
  .cards { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 360px; }
  .card {
    display: flex; align-items: center; gap: 16px;
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px 22px;
    text-decoration: none; color: var(--text);
    transition: transform .15s, box-shadow .15s;
    border: 1.5px solid var(--border-light);
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(27,38,64,.1); }
  .card:active { transform: scale(.98); }
  .card-icon {
    width: 48px; height: 48px; border-radius: 12px;
    background: var(--blue-light); display: flex;
    align-items: center; justify-content: center; font-size: 22px;
    flex-shrink: 0;
  }
  .card-text { flex: 1; }
  .card-title { font-size: 16px; font-weight: 700; }
  .card-desc { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .card-arrow { font-size: 18px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="logo-area">
    <div class="logo-icon">&#128203;</div>
    <div class="logo-title">Аудит точек</div>
    <div class="logo-sub">Магнат Бар / КДО — Сезон 2026</div>
  </div>
  <div class="cards">
    <a class="card" href="audit.html">
      <div class="card-icon">&#128221;</div>
      <div class="card-text">
        <div class="card-title">Заполнить аудит</div>
        <div class="card-desc">Форма проверки точки для аудиторов</div>
      </div>
      <div class="card-arrow">&#8594;</div>
    </a>
    <a class="card" href="dashboard.html">
      <div class="card-icon">&#128202;</div>
      <div class="card-text">
        <div class="card-title">Дашборд</div>
        <div class="card-desc">Результаты, фильтры, выгрузка в Excel</div>
      </div>
      <div class="card-arrow">&#8594;</div>
    </a>
  </div>
</body>
</html>
